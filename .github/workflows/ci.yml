name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate plugin (static + MCP stdio contracts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate
        run: python3 scripts/validate.py
      - name: Doctor (skip floor self-check for speed)
        run: python3 scripts/doctor.py --skip-self-check
      - name: Validate run seam
        run: python3 packages/design-playbook/tests/test_validate_run.py
      - name: Release / doctor / run-status unit tests
        run: |
          python3 tests/test_release.py
          python3 tests/test_doctor.py
          python3 tests/test_run_status.py
      - name: Syntax check (all Python)
        # py_compile is the always-on syntax gate. The MCP stdio suites now
        # also run as required gates below (ticket 06): preview mocks its
        # browser layer (no chromium); evidence is split into a no-chromium
        # pure-path group (contract/path validation) and a chromium capture
        # group (real-browser screenshots / a11y / trace). py_compile still
        # catches import/syntax regressions on the server launchers before
        # the heavier stdio runs kick in.
        run: |
          python3 -m py_compile \
            packages/design-playbook/mcp/preview/server.py \
            packages/design-playbook/mcp/evidence/server.py \
            packages/design-playbook/mcp/preview/test_server_stdio.py \
            packages/design-playbook/mcp/evidence/test_server_stdio.py \
            packages/design-playbook-preview/server.py \
            packages/design-playbook-evidence/server.py \
            scripts/validate.py \
            scripts/release.py \
            scripts/doctor.py \
            scripts/run_status.py \
            tests/test_release.py \
            tests/test_doctor.py \
            tests/test_run_status.py \
            packages/design-playbook/scripts/validate_run.py

      # ----------------------------------------------------------------
      # ticket 06: MCP stdio gates (required, merge-blocking).
      #   - Preview stdio: mocks browser/HTTP layer; no chromium needed.
      #   - Evidence stdio pure-path: contract/path validation that never
      #     reaches `from playwright.sync_api import sync_playwright`; runs
      #     with or without chromium (always required).
      #   - Evidence stdio capture: real-browser captures; needs chromium.
      #   - Playwright chromium install is the DEFAULT path. If the install
      #     step fails, the capture group is skipped-with-reason AND the gate
      #     is marked red (never silent green). See ticket 06 decision (b).
      # ----------------------------------------------------------------

      - name: Install pytest (for stdio gates)
        run: python3 -m pip install pytest

      - name: Preview MCP stdio tests (required)
        run: |
          python3 -m pytest packages/design-playbook/mcp/preview/test_server_stdio.py -v

      - name: Evidence MCP stdio — pure-path tests (required, no Playwright)
        # These never reach the Playwright import in execute_capture_plan
        # (server.py): unknown-arg / manifest.jsonl / G6 evidence-subtree
        # containment / overwrite opt-in / JSON-RPC parse-error all
        # short-circuit first, so they pass with or without chromium.
        # TODO(ticket 06 follow-up): replace the -k keyword filter with
        # pytest markers (needs a conftest.py — out of scope for this
        # ci.yml-only change) so new capture tests cannot silently slip
        # past the chromium gate. Update this list when capture tests are
        # added or renamed.
        run: |
          python3 -m pytest packages/design-playbook/mcp/evidence/test_server_stdio.py -v \
            -k "tools_list_exposes_execute_capture_plan \
                or provider_rejects_criterion_field \
                or provider_rejects_manifest_variants_and_path_escape \
                or provider_rejects_non_evidence_subtree_paths \
                or provider_refuses_overwrite_without_opt_in \
                or provider_rejects_unknown_and_criterion_ref_fields \
                or malformed_messages_return_parse_error_and_server_continues"

      - name: Install Playwright + chromium (ticket 06 default path)
        id: pw_install
        continue-on-error: true
        # TODO(smoke, ticket 05 / map.md "Not yet specified"): the exact
        # chromium install method is pending Codex RUN_ROOT smoke. Default
        # is the documented `playwright install --with-deps chromium` on
        # ubuntu-latest (passwordless sudo for --with-deps apt libs). If
        # the runner image or base changes, revisit. Tracked as "Not yet
        # specified" in map.md until smoke confirms.
        run: |
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: Evidence MCP stdio — capture tests (require chromium)
        if: steps.pw_install.outcome == 'success'
        # Real-browser captures: screenshot, a11y tree, interaction trace,
        # select_option, failure paths, overwrite opt-in. Requires the
        # Playwright + chromium install step above to have succeeded.
        run: |
          python3 -m pytest packages/design-playbook/mcp/evidence/test_server_stdio.py -v \
            -k "screenshot_capture_writes_artifact_never_manifest \
                or capture_without_explicit_page_state_reports_unknown \
                or a11y_tree_and_interaction_trace_write_artifacts \
                or select_option_action_drives_native_select \
                or failure_paths_never_echo_requested_state_as_observed \
                or provider_overwrites_when_opted_in"

      - name: Playwright missing — skip-with-reason, mark gate red
        if: steps.pw_install.outcome != 'success'
        # Decision (b): CI installs chromium by default. On missing, the
        # capture group is SKIPPED with a printed reason and this gate is
        # marked RED — never silent green. The pure-path group above still
        # ran and is required independent of chromium availability.
        run: |
          echo "::error::Playwright/chromium install failed; Evidence capture tests skipped-with-reason."
          echo "Per ticket 06 decision (b): CI installs chromium by default."
          echo "On missing, the chromium capture group is skipped and this gate"
          echo "is marked red (NOT silent green). Pure-path Evidence tests already ran."
          exit 1

      - name: Frontend floor (ADR-0008 JS verification) — deferred, skip-with-reason
        # TODO(ticket 06 follow-up): graduate test_floor_frontend.py to a
        # required gate once the Playwright install method is confirmed via
        # smoke (map.md "Not yet specified") and the chromium capture group
        # above has run green on main. Deferred per ticket 06: the deferral
        # is visible here as a documented skip-with-reason rather than
        # silently absent. Evidence capture tests already cover the provider
        # contract; the frontend floor adds JS submit/readiness coverage
        # (control.py floor-intercept) on top.
        if: steps.pw_install.outcome == 'success'
        run: |
          echo "::notice::Frontend floor deferred (ticket 06). Not gating 0.4.4."
          echo "Reason: Playwright install method pending smoke; graduate in a follow-up."
          echo "Acknowledged skip-with-reason — not a red mark."
